<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS Pro Downloader | All-in-One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #080808; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-border { position: relative; border-radius: 24px; transition: 0.3s; }
        .neon-border:focus-within { border-color: #ff0080; box-shadow: 0 0 20px rgba(255, 0, 128, 0.2); }
        .btn-premium { background: linear-gradient(90deg, #FF0080 0%, #7928CA 50%, #4facfe 100%); background-size: 200% auto; transition: 0.5s; }
        .btn-premium:hover { background-position: right center; transform: translateY(-2px); }
        .platform-icon { font-size: 1.5rem; opacity: 0.6; transition: 0.3s; }
        .platform-icon:hover { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-lg mt-12 text-center">
        <div class="inline-block p-1 rounded-2xl bg-gradient-to-r from-pink-500 to-blue-500 mb-4">
            <div class="bg-[#080808] px-4 py-1 rounded-xl">
                <span class="text-xs font-bold tracking-[0.2em] text-white">VIP ACCESS</span>
            </div>
        </div>
        <h1 class="text-4xl font-extrabold tracking-tighter mb-2">AS <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">DOWNLOADER</span></h1>
        <p class="text-gray-500 text-sm">Download from any site in one click</p>
    </header>

    <div class="flex gap-6 my-8">
        <i class="fa-brands fa-instagram platform-icon text-pink-500" title="Instagram"></i>
        <i class="fa-brands fa-facebook platform-icon text-blue-600" title="Facebook"></i>
        <i class="fa-brands fa-youtube platform-icon text-red-600" title="YouTube"></i>
        <i class="fa-brands fa-chrome platform-icon text-green-500" title="Web Video"></i>
    </div>

    <main class="w-full max-w-lg glass p-8 rounded-[32px] shadow-2xl">
        <div class="space-y-6">
            <div class="neon-border border border-white/10 p-1">
                <input type="text" id="videoUrl" placeholder="Paste video link here..." 
                    class="w-full bg-transparent py-4 px-5 focus:outline-none text-white placeholder:text-gray-600">
            </div>

            <button id="mainBtn" onclick="startDownload()" class="w-full btn-premium py-5 rounded-2xl font-bold text-lg shadow-xl flex items-center justify-center gap-3">
                <span id="btnText">FETCH VIDEO</span>
                <div id="loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
        </div>

        <div id="resultBox" class="hidden mt-10 animate-fade-in border-t border-white/10 pt-8">
            <div class="rounded-2xl overflow-hidden mb-6 border border-white/10 shadow-lg">
                <img id="previewImage" src="" alt="Thumbnail" class="w-full h-48 object-cover">
            </div>
            
            <div class="flex flex-col gap-3">
                <a id="downloadLink" href="#" target="_blank" class="w-full bg-white text-black py-4 rounded-xl font-extrabold text-center flex items-center justify-center gap-2">
                    <i class="fa-solid fa-download"></i> DOWNLOAD HD
                </a>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="shareWhatsApp()" class="bg-[#25D366] py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </button>
                    <button onclick="copyToClipboard()" class="bg-white/5 py-3 rounded-xl font-bold flex items-center justify-center gap-2 border border-white/10">
                        <i class="fa-regular fa-copy"></i> Copy
                    </button>
                </div>
            </div>
        </div>

        <div id="errorMsg" class="hidden mt-4 text-red-400 text-center text-sm font-medium bg-red-400/10 p-3 rounded-xl border border-red-400/20"></div>
    </main>

    <footer class="mt-auto py-10 text-center">
        <p class="text-gray-600 text-[10px] tracking-widest uppercase mb-1">Developed for Sarfaraz Siddiqui</p>
        <p class="text-gray-400 font-bold text-xs">ELLION INDIA ENTERPRISES</p>
    </footer>

    <script>
        async function startDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const errorMsg = document.getElementById('errorMsg');

            if (!url) {
                showError("Bhai, pehle link toh daalo!");
                return;
            }

            // Reset UI
            errorMsg.classList.add('hidden');
            resultBox.classList.add('hidden');
            btnText.innerText = "Searching...";
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                // NOTE: Use a Multi-Platform API like Cobalt or your custom Node.js backend
                const response = await fetch('http://localhost:3000/api/fetch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.status === 'success' || data.media) {
                    document.getElementById('previewImage').src = data.thumbnail || 'https://via.placeholder.com/400x200?text=Video+Ready';
                    document.getElementById('downloadLink').href = data.media;
                    resultBox.classList.remove('hidden');
                } else {
                    showError("Video nahi mila. Link check karein!");
                }
            } catch (err) {
                showError("Server Error! Make sure your Node.js is running.");
            } finally {
                btnText.innerText = "FETCH VIDEO";
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }

        function copyToClipboard() {
            const url = document.getElementById('videoUrl').value;
            navigator.clipboard.writeText(url);
            alert('Link Copied!');
        }

        function shareWhatsApp() {
            const url = document.getElementById('videoUrl').value;
            window.open(`https://wa.me/?text=Check this: ${url}`, '_blank');
        }
    </script>
</body>
</html>
